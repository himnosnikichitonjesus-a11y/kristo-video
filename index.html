<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feed de Streaming Plus</title>
<style>
    /* === VARIABLES Y RESET === */
    :root {
        --bg-color: #0f171e;
        --header-bg: rgba(15, 23, 30, 0.95);
        --text-color: #ffffff;
        --text-muted: #8197a4;
        --accent: #00a8e1;
        --hover-delay: 400ms;
        --transition-speed: 0.3s;
    }

    * { box-sizing: border-box; }
    body {
        font-family: 'Segoe UI', Roboto, Arial, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        padding: 0;
        overflow-x: hidden;
    }

    /* === BARRA FIJA DE BÚSQUEDA Y FILTROS === */
    .header-bar {
        position: sticky;
        top: 0;
        background: var(--header-bg);
        backdrop-filter: blur(10px);
        padding: 15px 4%;
        z-index: 1000;
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        align-items: center;
        border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .search-container {
        position: relative;
        flex: 0 1 300px;
    }
    .search-input {
        width: 100%;
        padding: 8px 16px 8px 35px;
        border: 1px solid rgba(255,255,255,0.3);
        border-radius: 4px;
        background: rgba(0,0,0,0.5);
        color: white;
        font-size: 14px;
        transition: all 0.3s ease;
    }
    .search-input:focus {
        border-color: var(--accent);
        background: black;
        outline: none;
    }
    .search-icon {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        opacity: 0.6;
        pointer-events: none;
    }

    .filters-container {
        flex: 1;
        display: flex;
        gap: 10px;
        overflow-x: auto;
        scrollbar-width: none;
        -ms-overflow-style: none;
    }
    .filters-container::-webkit-scrollbar { display: none; }
    .filter-btn {
        background: transparent;
        color: var(--text-color);
        border: none;
        font-size: 15px;
        font-weight: 600;
        padding: 8px 12px;
        cursor: pointer;
        border-radius: 4px;
        white-space: nowrap;
        transition: background 0.2s;
    }
    .filter-btn:hover { background: rgba(255,255,255,0.1); }
    .filter-btn.active { background: white; color: black; }

    /* === SECCIONES Y CARRUSELES === */
    .feed-container { padding: 30px 0 60px 0; }
    .section { margin-bottom: 3vw; position: relative; }
    
    .section-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        padding: 0 4%;
        margin-bottom: 10px;
    }
    .section h2 {
        font-size: 1.4vw;
        font-weight: bold;
        margin: 0;
        cursor: pointer;
        transition: color 0.2s;
    }
    .section h2:hover { color: var(--accent); }
    @media (max-width: 768px) { .section h2 { font-size: 18px; } }

    /* Flechas de Navegación (Solo Desktop) */
    .arrow-container { display: flex; gap: 5px; opacity: 0; transition: opacity 0.3s; }
    .section:hover .arrow-container { opacity: 1; }
    .arrow {
        background: rgba(255,255,255,0.1);
        color: white;
        border: none;
        cursor: pointer;
        width: 32px;
        height: 32px;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(5px);
    }
    .arrow:hover { background: rgba(255,255,255,0.3); }
    @media (max-width: 768px) { .arrow-container { display: none; } }

    /* Track del Carrusel */
    .carousel {
        position: relative;
        padding: 0 4%;
        overflow-x: auto;
        overflow-y: visible;
        scrollbar-width: none;
        scroll-behavior: smooth;
    }
    .carousel::-webkit-scrollbar { display: none; }
    
    .items {
        display: flex;
        gap: 10px;
        padding: 10px 0;
    }

    /* === TARJETAS BASE === */
    .item {
        position: relative;
        cursor: pointer;
        border-radius: 4px;
        overflow: hidden;
        flex-shrink: 0;
        background: #1a242c;
        transition: transform var(--transition-speed) ease, width var(--transition-speed) ease, height var(--transition-speed) ease;
        z-index: 5;
    }
    .item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* === TAMAÑOS UNIFICADOS === */
    @media (min-width: 768px) {
        .item.standard { width: 280px; aspect-ratio: 16/9; }
        .item.short { width: 200px; aspect-ratio: 9/16; }
        .item.top10 { width: 280px; aspect-ratio: 16/9; }
        
        /* Hover especial para tarjetas cortas (se expanden a rectangular) */
        .item.short:hover {
            width: 533px;  /* Aproximadamente 300px * 16/9 */
            height: 300px;
            z-index: 100;
            transform: scale(1) translateY(-10px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
    }
    @media (max-width: 767px) {
        .item.standard { width: calc(50% - 5px); aspect-ratio: 16/9; }
        .item.short { width: calc(33.33% - 7px); aspect-ratio: 9/16; }
        .item.top10 { width: calc(60% - 5px); aspect-ratio: 16/9; }
        .item:hover { transform: none !important; }
        
        .search-container { flex: 0 0 40px; min-width: 40px; }
        .search-input {
            width: 40px;
            padding: 10px;
            background: #333 url('https://nikichitonjesus.odoo.com/web/image/914-41ee4212/playblue.webp') no-repeat center;
            background-size: 20px;
            text-indent: -9999px;
        }
        .search-input:focus {
            width: calc(100vw - 40px);
            text-indent: 0;
            background-image: none;
            padding: 10px 14px;
        }
    }

    /* === ESTILOS PARA TOP 10 === */
    .top10-item {
        display: flex;
        align-items: center;
        gap: 5px;
    }
    .top10-number {
        font-size: 8vw;
        font-weight: 900;
        color: rgba(255,255,255,0.3);
        line-height: 1;
        min-width: 80px;
        text-align: right;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }
    @media (min-width: 768px) {
        .top10-number { font-size: 6vw; }
    }
    .top10-item .item {
        flex-shrink: 0;
    }

    /* === EL POP-OUT (Efecto Prime Video Hover) === */
    #hover-popout {
        position: absolute;
        z-index: 9999;
        background: #1a242c;
        border-radius: 8px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.9);
        overflow: hidden;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease, transform 0.2s ease;
        transform: scale(0.95);
        width: 320px;
        display: flex;
        flex-direction: column;
    }
    #hover-popout.active {
        opacity: 1;
        pointer-events: auto;
        transform: scale(1.15);
    }
    .popout-video-container {
        width: 100%;
        aspect-ratio: 16/9;
        background: #000;
        position: relative;
    }
    .popout-img { width: 100%; height: 100%; object-fit: cover; }
    .popout-info { padding: 15px; }
    .popout-title { font-size: 16px; font-weight: bold; margin-bottom: 8px; color: white;}
    .popout-controls {
        display: flex;
        gap: 10px;
        margin: 10px 0;
        align-items: center;
    }
    .btn-play-circle { 
        width: 40px; height: 40px; border-radius: 50%; background: white; color: black; 
        display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 20px;
    }
    .btn-icon {
        width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3);
        display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; font-size: 20px;
    }
    .btn-icon:hover { border-color: white; background: rgba(255,255,255,0.2); }
    .popout-meta {
        font-size: 12px; color: var(--text-muted); display: flex; gap: 8px; margin-bottom: 8px; font-weight: bold;
    }
    .age-rating { background: rgba(255,255,255,0.1); padding: 2px 4px; border-radius: 2px; color: white;}
    .prime-badge { color: #00a8e1; display: flex; align-items: center; font-size: 12px; font-weight: bold; margin-bottom: 8px;}
    .popout-desc { font-size: 12px; color: #ccc; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

    /* === CONTENEDOR DE BÚSQUEDA === */
    #search-results {
        background: #141414;
        min-height: 300px;
        padding: 20px 4% 40px;
        display: none;
    }
    .results-grid {
        display: grid;
        gap: 15px;
        grid-template-columns: repeat(2, 1fr);
    }
    @media (min-width: 768px) { .results-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (min-width: 1200px) { .results-grid { grid-template-columns: repeat(5, 1fr); } }
    .result-item {
        cursor: pointer;
        position: relative;
        border-radius: 8px;
        overflow: hidden;
        transition: transform 0.3s ease;
    }
    .result-item:hover { transform: scale(1.05); z-index: 10; }
    .result-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 8px;
        aspect-ratio: 16/9;
    }
    .result-item .title {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        background: rgba(0,0,0,0.7);
        color: white;
        padding: 8px;
        font-size: 0.9em;
        text-align: center;
    }

    /* === ESTILOS PARA TARJETAS EXPANDIDAS (CORTAS) === */
    .item.short .expanded-info {
        display: none;
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
        padding: 20px 10px 10px;
        color: white;
    }
    @media (min-width: 768px) {
        .item.short:hover .expanded-info {
            display: block;
        }
    }
    .expanded-title {
        font-weight: bold;
        margin-bottom: 8px;
        font-size: 14px;
    }
    .expanded-controls {
        display: flex;
        gap: 8px;
    }
    .expanded-btn {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: rgba(255,255,255,0.2);
        border: none;
        color: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
    }
    .expanded-btn.play {
        background: white;
        color: black;
    }

    /* === CONTINUAR VIENDO === */
    .item.continue .title {
        position: absolute;
        bottom: 20px;
        left: 0; right: 0;
        text-align: center;
        font-size: 0.8em;
        background: rgba(0,0,0,0.5);
        padding: 5px;
    }
    .item.continue .progress {
        position: absolute;
        bottom: 10px;
        left: 0; right: 0;
        height: 3px;
        background: grey;
    }
    .item.continue .progress-bar {
        height: 100%;
        background: #e50914;
    }
    .item.continue .play-btn {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        border: none;
        border-radius: 50%;
        width: 40px; height: 40px;
        cursor: pointer;
    }
    .item.continue .play-btn img { width: 100%; height: 100%; object-fit: contain; }
</style>

<div class="header-bar">
    <div class="search-container">
        <svg class="search-icon" width="16" height="16" fill="white" viewBox="0 0 16 16">
            <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"></path>
        </svg>
        <input type="text" class="search-input" placeholder="Buscar episodios..." id="searchInput">
    </div>
    <div class="filters-container" id="filtersContainer"></div>
</div>

<div id="search-results" class="search-results">
    <div class="results-grid"></div>
</div>

<div class="feed-container" id="main-feed">
    
</div>


<div id="hover-popout">
    <div class="popout-video-container">
        <img src="" alt="" class="popout-img" id="popout-img" loading="lazy">
    </div>
    <div class="popout-info">
        <div class="prime-badge">✓ Incluido con Prime</div>
        <div class="popout-controls">
            <a href="#" class="btn-play-circle" id="popout-play">▶</a>
            <div class="btn-icon">+</div>
            <div class="btn-icon">ℹ</div>
        </div>
        <div class="popout-title" id="popout-title">Título</div>
        <div class="popout-meta">
            <span>2024</span> <span>1 h 45 min</span> <span class="age-rating">13+</span>
        </div>
        <div class="popout-desc" id="popout-desc">Descripción del episodio.</div>
    </div>
</div>

<script>
    // === DATOS DE EPISODIOS ===
    const episodes = [
        { title: "Jacob y su promesa a Dios", thumbnail: "https://video.nikichitonjesus.org/web/image/433-ebb8fcfb/5.webp", thumbnail2: "https://video.nikichitonjesus.org/web/image/438-44d31586/6.webp", url: "/jacob-y-su-promesa-a-dios", categories: ["Historia", "Sermones"], desc: "La increíble historia bíblica de Jacob y la promesa divina que cambió su destino." },
        { title: "La creación", thumbnail: "https://video.nikichitonjesus.org/web/image/441-fb020957/8.webp", thumbnail2: "https://video.nikichitonjesus.org/web/image/434-677fb5d7/7.webp", url: "/la-creacion", categories: ["Historia", "Infantil"], desc: "En el principio, Dios creó los cielos y la tierra." },
        { title: "La creación (Destacado)", thumbnail: "https://video.nikichitonjesus.org/web/image/504-535d1a7b/adan%26eva.webp", thumbnail2: "https://video.nikichitonjesus.org/web/image/434-677fb5d7/7.webp", url: "/la-creacion", categories: ["Destacados"], isFeatured: true, desc: "Edición especial de la creación." },
        { title: "Job: Un hombre fiel", thumbnail: "https://video.nikichitonjesus.org/web/image/480-af818254/Job%20Un%20hombre%20fiel%20a%20Dios.webp", thumbnail2: "https://video.nikichitonjesus.org/web/image/439-6b2939e0/10.webp", url: "/job-un-hombre-fiel", categories: ["Destacados"], isFeatured: true, desc: "La fe inquebrantable de Job." },
        { title: "Job: Un hombre fiel", thumbnail: "https://video.nikichitonjesus.org/web/image/439-6b2939e0/10.webp", thumbnail2: "https://thumbs.odycdn.com/8af4f9c0fafd0185ae1d4bb97347bf94.webp", url: "/job-un-hombre-fiel", categories: ["Historia", "Infantil"], desc: "Lecciones de fe para niños." },
        { title: "La vida de Jesucristo en la tierra", thumbnail: "https://video.nikichitonjesus.org/web/image/432-b68317fc/1.webp", thumbnail2: "https://video.nikichitonjesus.org/web/image/435-87046e7e/2.webp", url: "/La-vida-de-jesus", categories: ["Historia", "Documental"], desc: "Un recorrido histórico." },
        { title: "La historia del nacimiento de Jesucristo", thumbnail: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgtfmv-lylzCQMc2OqENAtaFmB4Konqpz-gCkIRvyvmfNQ5ub7Ncv2q91vXe1-O3SZee2O0dSsbKKGih2OmZRk3wDfXNxLZRXFTJNNxAdqK2vwLTioYhaT4Ni4LHeRYbR8xxdeMlo7QOpWP1Mus4241SJurbLCbmwj_M4V1tjw0FZZW6jbi4Z21p-3mjX-y/s600/Redenci%C3%B3n%281%29-Cover.jpg", thumbnail2: "https://i.pinimg.com/736x/80/c3/2d/80c32dea2e940ddc4de74810277638c0.jpg", url: "/la-historia-del-nacimiento-de-jesucristo", categories: ["Historia", "Documental", "Destacados", "Infantil"], desc: "La noche más especial." },
        { title: "La historia del nacimiento de Jesucristo", thumbnail: "https://video.nikichitonjesus.org/web/image/506-592ed3e3/navidad001.webp", thumbnail2: "https://i.pinimg.com/736x/80/c3/2d/80c32dea2e940ddc4de74810277638c0.jpg", url: "/la-historia-del-nacimiento-de-jesucristo", categories: ["Destacados"], isFeatured: true, desc: "Especial de Navidad." },
        { title: "El origen de Halloween", thumbnail: "https://video.nikichitonjesus.org/web/image/437-5c9e773b/3.webp", thumbnail2: "https://video.nikichitonjesus.org/web/image/436-e2dc6de4/4.webp", url: "/origen-de-halloween", categories: ["Historia", "Documental", "Ciencia", "Conferencias"], desc: "Un análisis profundo." },
        { title: "La historia del Oriente Medio", thumbnail: "https://video.nikichitonjesus.org/web/image/440-b9ee12a1/9.webp", thumbnail2: "https://thumbs.odycdn.com/f43db839ef229d85df6b9f82963e2476.webp", url: "/la-historia-de-oriente-medio", categories: ["Historia", "Sermones", "Documental", "Ciencia"], desc: "Civilizaciones antiguas." },
        { title: "¿Qué es la gracia? Parte 1", thumbnail: "https://i.pinimg.com/1200x/83/5f/a0/835fa013e6c8bae78c7eb21ce296cdc1.jpg", thumbnail2: "https://i.pinimg.com/1200x/83/5f/a0/835fa013e6c8bae78c7eb21ce296cdc1.jpg", url: "/la-gracia-de-dios", categories: ["Sermones", "Infantil"], desc: "El regalo inmerecido." },
        { title: "La vida de Lutero y la Reforma", thumbnail: "https://video.nikichitonjesus.org/web/image/501-b774a418/Luterocov.webp", thumbnail2: "https://video.nikichitonjesus.org/web/image/501-b774a418/Luterocov.webp", url: "/lutero-y-la-reforma", categories: ["Documental", "Historia"], desc: "El monje que desafió al imperio." },
        { title: "La vida de Lutero y la Reforma", thumbnail: "https://video.nikichitonjesus.org/web/image/502-d3076a09/Lutero.webp", thumbnail2: "https://video.nikichitonjesus.org/web/image/501-b774a418/Luterocov.webp", url: "/lutero-y-la-reforma", categories: ["Destacados"], isFeatured: true, desc: "Edición destacada." },
        { title: "Música: Generación Valientes de David -GVD-", thumbnail: "https://video.nikichitonjesus.org/web/image/508-4f31256f/covers.webp", thumbnail2: "https://video.nikichitonjesus.org/web/image/508-4f31256f/covers.webp", url: "/gvd-chajul", categories: ["Música"], desc: "Alabanzas y adoración." }
    ];

    // === UTILIDADES ===
    function normalizeString(str) {
        return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, "");
    }

    // Fechas para ordenar "Recientes"
    const dates = { 
        "/jacob-y-su-promesa-a-dios": "2023-12-01", 
        "/la-creacion": "2023-12-01", 
        "/job-un-hombre-fiel": "2022-03-10", 
        "/La-vida-de-jesus": "2025-03-10", 
        "/la-historia-del-nacimiento-de-jesucristo": "2024-12-01", 
        "/origen-de-halloween": "2024-10-30", 
        "/la-historia-de-oriente-medio": "2023-10-07",
        "/la-gracia-de-dios": "2024-01-01",
        "/lutero-y-la-reforma": "2023-05-15",
        "/gvd-chajul": "2024-06-20"
    };

    // === CONFIGURACIÓN DE SECCIONES ===
    const sectionsConfig = [
        { 
            id: "recientes", 
            title: "Recientes", 
            format: "standard", 
            filter: () => [...episodes]
                .filter(ep => !ep.isFeatured)
                .sort((a, b) => new Date(dates[b.url] || 0) - new Date(dates[a.url] || 0))
        },
        { 
            id: "continuar", 
            title: "Continuar viendo", 
            format: "standard continue", 
            isContinue: true,
            filter: () => {
                // Simulamos historial para el ejemplo
                const history = JSON.parse(localStorage.getItem('watchedHistory') || '[]');
                const unfinished = history.filter(h => !h.completed)
                    .sort((a, b) => new Date(dates[b.url] || 0) - new Date(dates[a.url] || 0))
                    .slice(0, 10);
                if (!unfinished.length) return [];
                return unfinished.map(h => episodes.find(e => e.url === h.url) || h);
            }
        },
        { 
            id: "top10", 
            title: "Top 10 en tu país hoy", 
            format: "top10", 
            filter: () => {
                // Simulamos Top 10 con episodios destacados y algunos aleatorios
                const top10Episodes = episodes.filter(e => e.categories.includes("Destacados") || e.categories.includes("Documental")).slice(0, 10);
                return top10Episodes;
            }
        },
        { 
            id: "destacados", 
            title: "Destacados", 
            format: "short", 
            filter: () => episodes.filter(e => e.isFeatured)
        },
        { 
            id: "series", 
            title: "Series", 
            format: "standard", 
            filter: () => shuffle(episodes.filter(ep => ep.categories.some(c => normalizeString(c) === 'series')))
        },
        { 
            id: "historia", 
            title: "Historia", 
            format: "standard", 
            filter: () => shuffle(episodes.filter(ep => ep.categories.some(c => normalizeString(c) === 'historia')))
        },
        { 
            id: "sermones", 
            title: "Sermones", 
            format: "standard", 
            filter: () => shuffle(episodes.filter(ep => ep.categories.some(c => normalizeString(c) === 'sermones')))
        },
        { 
            id: "infantil", 
            title: "Infantil", 
            format: "standard", 
            filter: () => shuffle(episodes.filter(ep => ep.categories.some(c => normalizeString(c) === 'infantil')))
        },
        { 
            id: "musica", 
            title: "Música", 
            format: "standard", 
            filter: () => shuffle(episodes.filter(ep => ep.categories.some(c => normalizeString(c) === 'música')))
        },
        { 
            id: "conferencias", 
            title: "Conferencias", 
            format: "standard", 
            filter: () => shuffle(episodes.filter(ep => ep.categories.some(c => normalizeString(c) === 'conferencias')))
        }
    ];

    const feedContainer = document.getElementById('main-feed');

    function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

    // === GENERADOR DE CARRUSELES ===
    function generateFeeds() {
        feedContainer.innerHTML = '';
        sectionsConfig.forEach(section => {
            const items = section.filter();
            if (items.length === 0 && section.id !== 'continuar') return;

            let cardsHTML = '';
            
            if (section.format.includes('top10')) {
                // Formato especial para Top 10
                cardsHTML = items.map((ep, index) => `
                    <div class="top10-item" style="display: flex; align-items: center;">
                        <span class="top10-number">${index + 1}</span>
                        <div class="item top10" data-url="${ep.url}" data-title="${ep.title}" data-img="${ep.thumbnail}" data-img2="${ep.thumbnail2 || ep.thumbnail}" data-desc="${ep.desc || ''}">
                            <img src="${ep.thumbnail}" alt="${ep.title}" data-original="${ep.thumbnail}">
                            ${section.isContinue ? `
                                <div class="progress"><div class="progress-bar" style="width: ${Math.random() * 80}%"></div></div>
                            ` : ''}
                        </div>
                    </div>
                `).join('');
                // Envolvemos cada item en un div para mantener el número y la tarjeta juntos
                cardsHTML = `<div style="display: flex; gap: 0; align-items: center;">${cardsHTML}</div>`;
            } else {
                // Formato normal
                cardsHTML = items.map(ep => {
                    let itemHTML = `<div class="item ${section.format}" data-url="${ep.url}" data-title="${ep.title}" data-img="${ep.thumbnail}" data-img2="${ep.thumbnail2 || ep.thumbnail}" data-desc="${ep.desc || ''}">`;
                    itemHTML += `<img src="${ep.thumbnail}" alt="${ep.title}" data-original="${ep.thumbnail}">`;
                    
                    if (section.isContinue) {
                        const progress = Math.floor(Math.random() * 80);
                        itemHTML += `
                            <div class="title">${ep.title}</div>
                            <div class="progress"><div class="progress-bar" style="width: ${progress}%"></div></div>
                            <button class="play-btn"><img src="https://nikichitonjesus.odoo.com/web/image/914-41ee4212/playblue.webp" alt="Play"></button>
                        `;
                    }
                    
                    // Para tarjetas cortas, agregar información expandida
                    if (section.format.includes('short')) {
                        itemHTML += `
                            <div class="expanded-info">
                                <div class="expanded-title">${ep.title}</div>
                                <div class="expanded-controls">
                                    <button class="expanded-btn play">▶</button>
                                    <button class="expanded-btn">+</button>
                                    <button class="expanded-btn">ℹ</button>
                                </div>
                            </div>
                        `;
                    }
                    
                    itemHTML += `</div>`;
                    return itemHTML;
                }).join('');
            }

            const sectionHTML = `
                <div class="section" id="section-${section.id}">
                    <div class="section-header">
                        <h2 data-category="${normalizeString(section.title)}">${section.title}</h2>
                        <div class="arrow-container">
                            <button class="arrow left" onclick="scrollCarousel('${section.id}', -1)">❮</button>
                            <button class="arrow right" onclick="scrollCarousel('${section.id}', 1)">❯</button>
                        </div>
                    </div>
                    <div class="carousel" id="carousel-${section.id}">
                        <div class="items">
                            ${cardsHTML}
                        </div>
                    </div>
                </div>
            `;
            feedContainer.insertAdjacentHTML('beforeend', sectionHTML);
        });
    }

    generateFeeds();

    // Función para desplazar carruseles
    window.scrollCarousel = function(id, direction) {
        const carousel = document.getElementById(`carousel-${id}`);
        const scrollAmount = carousel.clientWidth * 0.7;
        carousel.scrollBy({ left: scrollAmount * direction, behavior: 'smooth' });
    };

    // === LÓGICA DEL POP-OUT (HOVER PARA TARJETAS STANDARD) ===
    const popout = document.getElementById('hover-popout');
    const popImg = document.getElementById('popout-img');
    const popTitle = document.getElementById('popout-title');
    const popDesc = document.getElementById('popout-desc');
    const popPlay = document.getElementById('popout-play');
    
    let hoverTimer;
    let isHoveringPopout = false;
    let currentCard = null;

    // === LÓGICA DEL POP-OUT CORREGIDA (POSICIÓN EXACTA SOBRE LA TARJETA) ===
function setupHoverEffects() {
    document.querySelectorAll('.item.standard:not(.short)').forEach(card => {
        card.addEventListener('mouseenter', (e) => {
            if (window.innerWidth <= 768) return;
            if (card.classList.contains('short')) return;

            currentCard = card;
            clearTimeout(hoverTimer);
            
            // Cambiar a thumbnail2 inmediatamente
            const img = card.querySelector('img');
            const img2 = card.dataset.img2;
            if (img2 && img2 !== img.src) {
                img.src = img2;
            }
            
            hoverTimer = setTimeout(() => {
                const rect = card.getBoundingClientRect();
                const data = card.dataset;

                popImg.src = data.img2 || data.img;
                popTitle.textContent = data.title;
                popDesc.textContent = data.desc || 'Sin descripción disponible.';
                popPlay.href = data.url;

                // === CORRECCIÓN: Posicionar EXACTAMENTE sobre la tarjeta ===
                // El pop-out tiene width: 320px, la tarjeta tiene width: 280px
                // Para centrarlo exactamente sobre la tarjeta, necesitamos:
                // left = posición izquierda de la tarjeta - (ancho_popout - ancho_tarjeta)/2
                
                const popoutWidth = 320;
                const cardWidth = rect.width;
                const offsetX = (popoutWidth - cardWidth) / 2;
                
                let topPos = rect.top + window.scrollY; // Misma posición Y que la tarjeta
                let leftPos = rect.left + window.scrollX - offsetX;

                // Ajustes para que no se salga de la pantalla
                if (leftPos < 10) leftPos = 10;
                if (leftPos + popoutWidth > window.innerWidth - 10) {
                    leftPos = window.innerWidth - popoutWidth - 10;
                }
                
                // Si está muy arriba, lo movemos un poco hacia abajo
                if (topPos < 10) topPos = 10;

                popout.style.top = `${topPos}px`;
                popout.style.left = `${leftPos}px`;
                
                popout.classList.add('active');
            }, 400);
        });

        card.addEventListener('mouseleave', () => {
            // Restaurar thumbnail original
            const img = card.querySelector('img');
            img.src = img.dataset.original;
            
            clearTimeout(hoverTimer);
            setTimeout(() => {
                if (!isHoveringPopout) {
                    popout.classList.remove('active');
                }
            }, 100);
        });
    });

        // Para tarjetas cortas, no usar pop-out, solo el hover de expansión
        document.querySelectorAll('.item.short').forEach(card => {
            card.addEventListener('mouseenter', () => {
                const img = card.querySelector('img');
                const img2 = card.dataset.img2;
                if (img2 && img2 !== img.src) {
                    img.src = img2;
                }
            });
            card.addEventListener('mouseleave', () => {
                const img = card.querySelector('img');
                img.src = img.dataset.original;
            });
        });

        // Mantener popout abierto si el ratón está encima
        popout.addEventListener('mouseenter', () => { isHoveringPopout = true; });
        popout.addEventListener('mouseleave', () => { 
            isHoveringPopout = false; 
            popout.classList.remove('active');
            if (currentCard) {
                const img = currentCard.querySelector('img');
                img.src = img.dataset.original;
            }
        });
    }

    // === CLICS EN TARJETAS ===
    document.addEventListener('click', (e) => {
        const item = e.target.closest('.item');
        const resultItem = e.target.closest('.result-item');

        if (resultItem) {
            window.location.href = resultItem.dataset.link;
            return;
        }

        if (!item) return;
        if (item.classList.contains('continue') && e.target.closest('.play-btn')) {
            const ep = { 
                url: item.dataset.url, 
                title: item.dataset.title, 
                thumbnail: item.querySelector('img').src, 
                thumbnail2: item.dataset.img2 
            };
            openVideoPlayer({ episodes: [ep] }, 0);
        } else {
            window.location.href = item.dataset.url;
        }
    });

    // === GENERAR FILTROS DINÁMICOS ===
    function generateFilters() {
        const filtersContainer = document.getElementById('filtersContainer');
        const fixedFilters = ['Todos', 'Series'];
        const allCategories = [...new Set(episodes.flatMap(ep => ep.categories))].filter(cat => !fixedFilters.includes(cat));
        const shuffledCategories = shuffle(allCategories);
        const filters = [...fixedFilters, ...shuffledCategories];

        filtersContainer.innerHTML = '';
        filters.forEach(filter => {
            const btn = document.createElement('button');
            btn.className = 'filter-btn';
            btn.dataset.filter = normalizeString(filter);
            btn.textContent = filter;
            if (filter === 'Todos') btn.classList.add('active');
            filtersContainer.appendChild(btn);
        });
    }
    generateFilters();
    const filterBtns = document.querySelectorAll('.filter-btn');

    // === BÚSQUEDA Y FILTROS ===
    const searchInput = document.getElementById('searchInput');
    let activeFilter = 'todos';

    function filterContent() {
        const query = normalizeString(searchInput.value.trim());
        const isSearching = query !== '' || activeFilter !== 'todos';
        const mainFeed = document.querySelectorAll('.section');
        const resultsContainer = document.getElementById('search-results');
        const resultsGrid = resultsContainer.querySelector('.results-grid');

        if (!isSearching) {
            mainFeed.forEach(s => s.style.display = '');
            resultsContainer.style.display = 'none';
            return;
        }

        let filtered = episodes.filter(ep => !ep.isFeatured);

        if (query) {
            filtered = filtered.filter(ep => normalizeString(ep.title).includes(query));
        }

        if (activeFilter !== 'todos') {
            filtered = filtered.filter(ep => ep.categories.some(c => normalizeString(c) === activeFilter));
        }

        resultsGrid.innerHTML = '';
        if (filtered.length === 0) {
            resultsGrid.innerHTML = '<p style="grid-column: 1 / -1; text-align: center; color: #aaa; margin: 20px 0;">No se encontraron resultados</p>';
        } else {
            filtered.forEach(ep => {
                const item = document.createElement('div');
                item.className = 'result-item';
                item.dataset.link = ep.url;
                item.innerHTML = `
                    <img src="${ep.thumbnail}" alt="${ep.title}">
                    <div class="title">${ep.title}</div>
                `;
                resultsGrid.appendChild(item);
            });
        }

        mainFeed.forEach(s => s.style.display = 'none');
        resultsContainer.style.display = 'block';
    }

    searchInput.addEventListener('input', filterContent);
    filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            filterBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeFilter = btn.dataset.filter;
            filterContent();
        });
    });

    // === TÍTULOS DE SECCIONES CLICABLES ===
    document.querySelectorAll('.section h2').forEach(h2 => {
        h2.addEventListener('click', () => {
            const cat = h2.dataset.category;
            const btn = [...filterBtns].find(b => b.dataset.filter === cat);
            if (btn) {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeFilter = cat;
                filterContent();
            }
        });
    });

    // === CONTINUAR VIENDO (simulado) ===
    async function populateContinue() {
        // Simulamos algunos elementos en historial para el ejemplo
        if (!localStorage.getItem('watchedHistory')) {
            const mockHistory = [
                { url: "/jacob-y-su-promesa-a-dios", completed: false, progress: 45 },
                { url: "/la-creacion", completed: false, progress: 70 },
                { url: "/job-un-hombre-fiel", completed: false, progress: 30 }
            ];
            localStorage.setItem('watchedHistory', JSON.stringify(mockHistory));
        }
        // Regenerar la sección de continuar viendo
        const continueSection = sectionsConfig.find(s => s.id === 'continuar');
        if (continueSection) {
            const items = continueSection.filter();
            const carousel = document.getElementById('carousel-continuar');
            if (carousel) {
                const itemsContainer = carousel.querySelector('.items');
                if (items.length === 0) {
                    itemsContainer.innerHTML = '<p style="color:#ccc; padding:0 10px;">No hay episodios por continuar</p>';
                } else {
                    itemsContainer.innerHTML = items.map(ep => {
                        const progress = Math.floor(Math.random() * 80);
                        return `
                            <div class="item standard continue" data-url="${ep.url}" data-title="${ep.title}" data-img="${ep.thumbnail}" data-img2="${ep.thumbnail2 || ep.thumbnail}" data-desc="${ep.desc || ''}">
                                <img src="${ep.thumbnail}" alt="${ep.title}" data-original="${ep.thumbnail}">
                                <div class="title">${ep.title}</div>
                                <div class="progress"><div class="progress-bar" style="width: ${progress}%"></div></div>
                                <button class="play-btn"><img src="https://nikichitonjesus.odoo.com/web/image/914-41ee4212/playblue.webp" alt="Play"></button>
                            </div>
                        `;
                    }).join('');
                }
            }
        }
        // Reconfigurar efectos hover después de regenerar
        setTimeout(setupHoverEffects, 100);
    }

    // Inicializar
    populateContinue();
    setTimeout(setupHoverEffects, 500);
    window.addEventListener('resize', () => setTimeout(setupHoverEffects, 300));
</script>
