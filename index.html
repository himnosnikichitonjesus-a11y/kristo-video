<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Streaming Plus · Fe y Conocimiento</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Barra de navegación fija (SPA) -->
    <header class="navbar">
        <div class="logo" data-link="/">STREAM+</div>
        <div class="nav-links">
            <a href="#" data-link="/">Inicio</a>
            <a href="#" data-link="/explorar">Explorar</a>
            <a href="#" data-link="/biblioteca">Mi lista</a>
            <a href="#" data-link="/buscar">Buscar</a>
        </div>
        <div class="search-icon-mobile" id="mobile-search-toggle">🔍</div>
    </header>

    <!-- Contenedor principal donde se montan las vistas (SPA) -->
    <main id="app"></main>

    <!-- Pop-out para hover (oculto por defecto) -->
    <div id="hover-popout">
        <div class="popout-video-container">
            <img src="" alt="" class="popout-img" id="popout-img" loading="lazy">
        </div>
        <div class="popout-info">
            <div class="prime-badge">✓ Incluido con Prime</div>
            <div class="popout-controls">
                <a href="#" class="btn-play-circle" id="popout-play">▶</a>
                <div class="btn-icon" id="popout-add">+</div>
                <div class="btn-icon" id="popout-info">ℹ</div>
            </div>
            <div class="popout-title" id="popout-title">Título</div>
            <div class="popout-meta">
                <span id="popout-year">2024</span> <span id="popout-duration">1 h 45 min</span> <span class="age-rating" id="popout-rating">13+</span>
            </div>
            <div class="popout-desc" id="popout-desc">Descripción del episodio.</div>
        </div>
    </div>

    <!-- Reproductor universal (inicialmente oculto) -->
    <div id="universal-player" style="display: none;">
        <div class="player-container">
            <div class="player-header">
                <div class="player-title"></div>
                <button id="close-player">✕</button>
            </div>
            <video id="player-video" controls></video>
            <div class="player-episodes-list"></div>
        </div>
    </div>

    <!-- Notificación toast -->
    <div id="toast-notification" class="toast-notification"></div>

    <!-- Scripts modulares (SPA) -->
    <script src="js/media.js" type="module"></script>
    <script src="js/memoria.js" type="module"></script>
    <script src="js/universal-player.js" type="module"></script>
    <script src="js/watch.js" type="module"></script>
    <script src="js/biblioteca.js" type="module"></script>
    <script src="js/explorar.js" type="module"></script>
    <script src="js/buscar.js" type="module"></script>
    <script src="js/404.js" type="module"></script>
    <script src="js/main.js" type="module"></script>
</body>
</html>
